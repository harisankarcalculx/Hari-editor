name: Build ad-free APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create Android App
        run: |
          cordova create app com.hari.editor "HARI Editor Pro"
          cd app
          cordova platform add android
          rm -rf www/*
          cp ../index.html www/
          cordova build android --no-telemetry

      - name: Upload Clean APK
        uses: actions/upload-artifact@v4
        with:
          name: HARI-Editor-Pro-APK
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
