            });
            syncAllUI();
            if (state.image) renderImage();
            updateStatus('Filters reset');
          });
        }

        // Effects
        ['vignette', 'tiltShift'].forEach(key => {
          const el = document.getElementById(key + 'Slider');
          if (el) {
            el.addEventListener('input', () => {
              const val = parseFloat(el.value);
              state.effects[key] = val;
              document.getElementById(key + 'Val').textContent = val;
              if (state.image) renderImage();
            });
          }
        });
        const grad1 = document.getElementById('gradColor1');
        const grad2 = document.getElementById('gradColor2');
        if (grad1 && grad2) {
          const updateGrad = () => {
            state.effects.gradientColors = [grad1.value, grad2.value];
            if (state.effects.gradientMap && state.image) renderImage();
          };
          grad1.addEventListener('input', updateGrad);
          grad2.addEventListener('input', updateGrad);
        }
        const gradToggle = document.getElementById('gradToggle');
        if (gradToggle) {
          gradToggle.addEventListener('change', () => {
            state.effects.gradientMap = gradToggle.checked;
            if (state.image) renderImage();
          });
        }
        const applyEffectsBtn = document.getElementById('applyEffectsBtn');
        if (applyEffectsBtn) {
          applyEffectsBtn.addEventListener('click', () => {
            if (state.image) { renderImage();
              saveHistory();
              updateStatus('Effects applied'); }
          });
        }
        const resetEffectsBtn = document.getElementById('resetEffectsBtn');
        if (resetEffectsBtn) {
          resetEffectsBtn.addEventListener('click', () => {
            state.effects.vignette = 0;
            state.effects.tiltShift = 0;
            state.effects.gradientMap = false;
            state.effects.gradientColors = ['#000000', '#ffffff'];
            syncAllUI();
            if (state.image) renderImage();
            updateStatus('Effects reset');
          });
        }

        // Transform
        document.getElementById('rotLeft')?.addEventListener('click', () => {
          state.transform.rotation = (state.transform.rotation - 90) % 360;
        });
        document.getElementById('rotRight')?.addEventListener('click', () => {
          state.transform.rotation = (state.transform.rotation + 90) % 360;
        });
        document.getElementById('rot180')?.addEventListener('click', () => {
          state.transform.rotation = (state.transform.rotation + 180) % 360;
        });
        const rotCustom = document.getElementById('rotCustom');
        if (rotCustom) {
          rotCustom.addEventListener('click', () => {
            const angle = parseFloat(document.getElementById('rotAngle').value) || 0;
            state.transform.rotation = (state.transform.rotation + angle) % 360;
          });
        }
        document.getElementById('flipH')?.addEventListener('click', () => {
          state.transform.flipH = !state.transform.flipH;
        });
        document.getElementById('flipV')?.addEventListener('click', () => {
          state.transform.flipV = !state.transform.flipV;
        });
        const applyTransformBtn = document.getElementById('applyTransformBtn');
        if (applyTransformBtn) {
          applyTransformBtn.addEventListener('click', applyTransform);
        }

        // Crop
        const cropRatio = document.getElementById('cropRatio');
        if (cropRatio) {
          cropRatio.addEventListener('change', () => {
            const val = cropRatio.value;
            if (val === 'free') state.crop.aspectRatio = null;
            else {
              const parts = val.split(':');
              state.crop.aspectRatio = parseFloat(parts[0]) / parseFloat(parts[1]);
            }
            if (state.crop.active && state.image) {
              const imgW = state.image.width,
                imgH = state.image.height;
              let cw = state.crop.w,
                ch = state.crop.h;
              if (state.crop.aspectRatio) {
                const ratio = state.crop.aspectRatio;
                if (cw / ch > ratio) ch = cw / ratio;
                else cw = ch * ratio;
                if (state.crop.x + cw > imgW) cw = imgW - state.crop.x;
                if (state.crop.y + ch > imgH) ch = imgH - state.crop.y;
                state.crop.w = cw;
                state.crop.h = ch;
                updateCropOverlay();
              }
            }
          });
        }
        document.getElementById('applyCropBtn')?.addEventListener('click', applyCrop);
        document.getElementById('cancelCropBtn')?.addEventListener('click', cancelCrop);
        document.getElementById('resetCropBtn')?.addEventListener('click', () => {
          if (state.image) {
            state.crop.x = 0;
            state.crop.y = 0;
            state.crop.w = state.image.width;
            state.crop.h = state.image.height;
            updateCropOverlay();
          }
        });

        // Draw
        document.querySelectorAll('.draw-tool').forEach(el => {
          el.addEventListener('click', () => {
            document.querySelectorAll('.draw-tool').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            state.draw.tool = el.dataset.tool;
            overlayCanvas.classList.add('interactive');
          });
        });
        const drawColor = document.getElementById('drawColor');
        if (drawColor) drawColor.addEventListener('input', () => state.draw.color = drawColor.value);
        const drawSize = document.getElementById('drawSize');
        if (drawSize) drawSize.addEventListener('input', () => state.draw.size = parseFloat(drawSize.value) || 10);
        const drawOpacity = document.getElementById('drawOpacity');
        if (drawOpacity) drawOpacity.addEventListener('input', () => state.draw.opacity = parseFloat(drawOpacity.value) || 1);
        const drawText = document.getElementById('drawText');
        if (drawText) drawText.addEventListener('input', () => state.draw.text = drawText.value);
        const drawFontSize = document.getElementById('drawFontSize');
        if (drawFontSize) drawFontSize.addEventListener('input', () => state.draw.fontSize = parseInt(drawFontSize.value) ||
          24);
        const drawBlendMode = document.getElementById('drawBlendMode');
        if (drawBlendMode) drawBlendMode.addEventListener('change', () => state.draw.blendMode = drawBlendMode.value);

        // Drawing mouse events on overlay canvas
        overlayCanvas.addEventListener('mousedown', (e) => {
          if (!state.image) return;
          if (!state.draw.tool) return;
          const rect = overlayCanvas.getBoundingClientRect();
          const scaleX = overlayCanvas.width / rect.width;
          const scaleY = overlayCanvas.height / rect.height;
          state.isDrawing = true;
          state.lastX = (e.clientX - rect.left) * scaleX;
          state.lastY = (e.clientY - rect.top) * scaleY;
          if (state.draw.tool === 'text') {
            const color = state.draw.color;
            const size = state.draw.fontSize;
            const text = state.draw.text;
            overlayCtx.font = `${size}px sans-serif`;
            overlayCtx.fillStyle = color;
            overlayCtx.globalAlpha = state.draw.opacity;
            overlayCtx.fillText(text, state.lastX, state.lastY);
            overlayCtx.globalAlpha = 1;
            state.isDrawing = false;
            return;
          }
        });

        overlayCanvas.addEventListener('mousemove', (e) => {
          if (!state.isDrawing) return;
          const rect = overlayCanvas.getBoundingClientRect();
          const scaleX = overlayCanvas.width / rect.width;
          const scaleY = overlayCanvas.height / rect.height;
          const x = (e.clientX - rect.left) * scaleX;
          const y = (e.clientY - rect.top) * scaleY;

          const tool = state.draw.tool;
          const color = state.draw.color;
          const size = state.draw.size;
          const opacity = state.draw.opacity;

          overlayCtx.globalAlpha = opacity;
          overlayCtx.lineWidth = size;
          overlayCtx.lineCap = 'round';
          overlayCtx.lineJoin = 'round';

          if (tool === 'brush' || tool === 'eraser') {
            const isEraser = tool === 'eraser';
            overlayCtx.globalCompositeOperation = isEraser ? 'destination-out' : state.draw.blendMode;
            overlayCtx.strokeStyle = isEraser ? '#fff' : color;
            overlayCtx.beginPath();
            overlayCtx.moveTo(state.lastX, state.lastY);
            overlayCtx.lineTo(x, y);
            overlayCtx.stroke();
          } else if (tool === 'rect') {
            overlayCtx.globalCompositeOperation = state.draw.blendMode;
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            const w = x - state.lastX;
            const h = y - state.lastY;
            overlayCtx.strokeStyle = color;
            overlayCtx.lineWidth = size;
            overlayCtx.strokeRect(state.lastX, state.lastY, w, h);
          } else if (tool === 'circle') {
            overlayCtx.globalCompositeOperation = state.draw.blendMode;
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            const radius = Math.sqrt((x - state.lastX) ** 2 + (y - state.lastY) ** 2);
            overlayCtx.strokeStyle = color;
            overlayCtx.lineWidth = size;
            overlayCtx.beginPath();
            overlayCtx.arc(state.lastX, state.lastY, radius, 0, Math.PI * 2);
            overlayCtx.stroke();
          } else if (tool === 'line') {
            overlayCtx.globalCompositeOperation = state.draw.blendMode;
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            overlayCtx.strokeStyle = color;
            overlayCtx.lineWidth = size;
            overlayCtx.beginPath();
            overlayCtx.moveTo(state.lastX, state.lastY);
            overlayCtx.lineTo(x, y);
            overlayCtx.stroke();
          }
          state.lastX = x;
          state.lastY = y;
        });

        overlayCanvas.addEventListener('mouseup', () => {
          state.isDrawing = false;
        });
        overlayCanvas.addEventListener('mouseleave', () => {
          state.isDrawing = false;
        });

        const applyDrawBtn = document.getElementById('applyDrawBtn');
        if (applyDrawBtn) {
          applyDrawBtn.addEventListener('click', () => {
            if (!state.image) return;
            const w = canvas.width,
              h = canvas.height;
            const mainData = ctx.getImageData(0, 0, w, h);
            const overlayData = overlayCtx.getImageData(0, 0, w, h);
            const d1 = mainData.data,
              d2 = overlayData.data;
            // Use blend mode
            const blendMode = state.draw.blendMode;
            for (let i = 0; i < d1.length; i += 4) {
              const a = d2[i + 3] / 255;
              if (a === 0) continue;
              const sr = d2[i],
                sg = d2[i + 1],
                sb = d2[i + 2];
              let br = d1[i],
                bg = d1[i + 1],
                bb = d1[i + 2];
              // Normalize to 0-1
              let r = br / 255,
                g = bg / 255,
                b = bb / 255;
              let sr2 = sr / 255,
                sg2 = sg / 255,
                sb2 = sb / 255;
              let result;
              switch (blendMode) {
                case 'multiply':
                  result = [r * sr2, g * sg2, b * sb2];
                  break;
                case 'screen':
                  result = [1 - (1 - r) * (1 - sr2), 1 - (1 - g) * (1 - sg2), 1 - (1 - b) * (1 - sb2)];
                  break;
                case 'overlay':
                  result = [
                    r < 0.5 ? 2 * r * sr2 : 1 - 2 * (1 - r) * (1 - sr2),
                    g < 0.5 ? 2 * g * sg2 : 1 - 2 * (1 - g) * (1 - sg2),
                    b < 0.5 ? 2 * b * sb2 : 1 - 2 * (1 - b) * (1 - sb2)
                  ];
                  break;
                case 'difference':
                  result = [Math.abs(r - sr2), Math.abs(g - sg2), Math.abs(b - sb2)];
                  break;
                case 'lighten':
                  result = [Math.max(r, sr2), Math.max(g, sg2), Math.max(b, sb2)];
                  break;
                case 'darken':
                  result = [Math.min(r, sr2), Math.min(g, sg2), Math.min(b, sb2)];
                  break;
                default:
                  result = [sr2, sg2, sb2]; // source-over
              }
              d1[i] = clamp(Math.round(lerp(br, result[0] * 255, a)), 0, 255);
              d1[i + 1] = clamp(Math.round(lerp(bg, result[1] * 255, a)), 0, 255);
              d1[i + 2] = clamp(Math.round(lerp(bb, result[2] * 255, a)), 0, 255);
            }
            ctx.putImageData(mainData, 0, 0);
            overlayCtx.clearRect(0, 0, w, h);
            saveHistory();
            updateStatus('Drawing applied with blend mode');
          });
        }
        const clearDrawBtn = document.getElementById('clearDrawBtn');
        if (clearDrawBtn) {
          clearDrawBtn.addEventListener('click', () => {
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            updateStatus('Drawing cleared');
          });
        }

        // Export
        const expFormat = document.getElementById('exportFormat');
        if (expFormat) expFormat.addEventListener('change', () => state.export.format = expFormat.value);
        const expQuality = document.getElementById('exportQuality');
        if (expQuality) {
          expQuality.addEventListener('input', () => {
            state.export.quality = parseInt(expQuality.value);
            document.getElementById('exportQualityVal').textContent = state.export.quality;
          });
        }
        const exportNow = document.getElementById('exportNowBtn');
        if (exportNow) exportNow.addEventListener('click', exportImage);
      }

      // ─── Curve Editor with Spline ──────────────────────────────

      let curvePoints = {
        rgb: [
          [0, 0],
          [255, 255]
        ],
        red: [
          [0, 0],
          [255, 255]
        ],
        green: [
          [0, 0],
          [255, 255]
        ],
        blue: [
          [0, 0],
          [255, 255]
        ]
      };
      let activeCurveChannel = 'rgb';
      let curveDragging = false;
      let curveDragIndex = -1;

      function renderCurveEditor() {
        const canvas = document.getElementById('curveEditor');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width,
          h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#1a1a22';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#33333d';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 4; i++) {
          const x = (i / 4) * w;
          const y = (i / 4) * h;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, h);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
          ctx.stroke();
        }

        const channel = document.querySelector('.curve-channel.active')?.dataset.channel || 'rgb';
        activeCurveChannel = channel;
        const points = curvePoints[channel] || [
          [0, 0],
          [255, 255]
        ];
        points.sort((a, b) => a[0] - b[0]);

        // Generate spline curve using catmull-rom interpolation
        function catmullRom(points, numSegments = 100) {
          if (points.length < 2) return [];
          if (points.length === 2) {
            return [points[0], points[1]];
          }
          const pts = [];
          for (let i = 0; i < points.length - 1; i++) {
            const p0 = points[Math.max(i - 1, 0)];
            const p1 = points[i];
            const p2 = points[i + 1];
            const p3 = points[Math.min(i + 2, points.length - 1)];
            for (let t = 0; t <= 1; t += 1 / numSegments) {
              const t2 = t * t,
                t3 = t2 * t;
              const x = 0.5 * ((2 * p1[0]) + (-p0[0] + p2[0]) * t + (2 * p0[0] - 5 * p1[0] + 4 * p2[0] - p3[0]) * t2 + (-
                p0[0] + 3 * p1[0] - 3 * p2[0] + p3[0]) * t3);
              const y = 0.5 * ((2 * p1[1]) + (-p0[1] + p2[1]) * t + (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * t2 + (-
                p0[1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * t3);
              pts.push([clamp(x, 0, 255), clamp(y, 0, 255)]);
            }
          }
          return pts;
        }

        const curve = catmullRom(points, 50);
        ctx.strokeStyle = '#f5a623';
        ctx.lineWidth = 2;
        ctx.beginPath();
        curve.forEach((p, idx) => {
          const px = (p[0] / 255) * w;
          const py = h - (p[1] / 255) * h;
          if (idx === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.stroke();

        // Draw control points
        points.forEach((p, idx) => {
          const px = (p[0] / 255) * w;
          const py = h - (p[1] / 255) * h;
          ctx.beginPath();
          ctx.arc(px, py, 4, 0, Math.PI * 2);
          ctx.fillStyle = '#f5a623';
          ctx.fill();
          ctx.strokeStyle = '#0d0d0f';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        });

        canvas._points = points;
        canvas._channel = channel;
      }

      // Curve interaction
      document.addEventListener('mousedown', (e) => {
        const canvas = document.getElementById('curveEditor');
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * canvas.width;
        const y = (e.clientY - rect.top) / rect.height * canvas.height;
        const points = canvas._points || [];
        if (!points.length) return;
        let found = -1;
        points.forEach((p, idx) => {
          const px = (p[0] / 255) * canvas.width;
          const py = canvas.height - (p[1] / 255) * canvas.height;
          if (Math.abs(x - px) < 8 && Math.abs(y - py) < 8) found = idx;
        });
        if (found >= 0) {
          curveDragging = true;
          curveDragIndex = found;
          return;
        }
        // Add new point
        const newX = clamp(Math.round((x / canvas.width) * 255), 0, 255);
        const newY = clamp(Math.round((1 - y / canvas.height) * 255), 0, 255);
        if (points.some(p => Math.abs(p[0] - newX) < 3)) return;
        points.push([newX, newY]);
        points.sort((a, b) => a[0] - b[0]);
        const channel = canvas._channel || 'rgb';
        state.curves[channel] = pointsToCurve(points);
        renderCurveEditor();
        if (state.image) renderImage();
      });

      document.addEventListener('mousemove', (e) => {
        if (!curveDragging) return;
        const canvas = document.getElementById('curveEditor');
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * canvas.width;
        const y = (e.clientY - rect.top) / rect.height * canvas.height;
        const points = canvas._points || [];
        if (curveDragIndex < 0 || curveDragIndex >= points.length) return;
        let newX = clamp(Math.round((x / canvas.width) * 255), 0, 255);
        let newY = clamp(Math.round((1 - y / canvas.height) * 255), 0, 255);
        if (curveDragIndex === 0) newX = 0;
        if (curveDragIndex === points.length - 1) newX = 255;
        points[curveDragIndex] = [newX, newY];
        points.sort((a, b) => a[0] - b[0]);
        const channel = canvas._channel || 'rgb';
        state.curves[channel] = pointsToCurve(points);
        renderCurveEditor();
        if (state.image) renderImage();
      });

      document.addEventListener('mouseup', () => {
        if (curveDragging) {
          curveDragging = false;
          curveDragIndex = -1;
          if (state.image) saveHistory();
        }
      });

      function pointsToCurve(points) {
        const curve = new Array(256);
        if (points.length === 0) {
          for (let i = 0; i < 256; i++) curve[i] = i;
          return curve;
        }
        points.sort((a, b) => a[0] - b[0]);
        // Use spline interpolation for smooth curve
        const pts = [];
        for (let i = 0; i < points.length; i++) {
          pts.push(points[i]);
        }
        // Ensure endpoints at 0 and 255
        if (pts[0][0] !== 0) pts.unshift([0, pts[0][1]]);
        if (pts[pts.length - 1][0] !== 255) pts.push([255, pts[pts.length - 1][1]]);
        // Generate spline points
        const spline = [];
        for (let i = 0; i < pts.length - 1; i++) {
          const p0 = pts[Math.max(i - 1, 0)];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = pts[Math.min(i + 2, pts.length - 1)];
          for (let t = 0; t <= 1; t += 0.01) {
            const t2 = t * t,
              t3 = t2 * t;
            const x = 0.5 * ((2 * p1[0]) + (-p0[0] + p2[0]) * t + (2 * p0[0] - 5 * p1[0] + 4 * p2[0] - p3[0]) * t2 + (-p0[
              0] + 3 * p1[0] - 3 * p2[0] + p3[0]) * t3);
            const y = 0.5 * ((2 * p1[1]) + (-p0[1] + p2[1]) * t + (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * t2 + (-p0[
              1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * t3);
            spline.push([clamp(x, 0, 255), clamp(y, 0, 255)]);
          }
        }
        // Map to curve array
        let idx = 0;
        for (let i = 0; i < 256; i++) {
          while (idx < spline.length - 1 && spline[idx + 1][0] < i) idx++;
          if (idx >= spline.length - 1) curve[i] = spline[spline.length - 1][1];
          else {
            const x0 = spline[idx][0],
              y0 = spline[idx][1];
            const x1 = spline[idx + 1][0],
              y1 = spline[idx + 1][1];
            if (x1 === x0) curve[i] = y0;
            else curve[i] = Math.round(lerp(y0, y1, (i - x0) / (x1 - x0)));
          }
        }
        return curve;
      }

      // ─── Histogram ──────────────────────────────────────────────

      function renderHistogram() {
        const canvas = document.getElementById('histogramCanvas');
        if (!canvas || !state.image) return;
        const w = canvas.width,
          h = canvas.height;
        const ctx = canvas.getContext('2d');
        // Get current canvas data
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const hist = new Array(256).fill(0);
        const len = data.length;
        for (let i = 0; i < len; i += 4) {
          const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
          hist[Math.round(lum)]++;
        }
        let max = 0;
        for (let i = 0; i < 256; i++) if (hist[i] > max) max = hist[i];
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#2a2a32';
        ctx.fillRect(0, 0, w, h);
        if (max === 0) return;
        for (let i = 0; i < 256; i++) {
          const height = (hist[i] / max) * h;
          ctx.fillStyle = '#f5a623';
          ctx.fillRect(i * (w / 256), h - height, Math.max(1, w / 256), height);
        }
      }

      // ─── Crop Interaction ──────────────────────────────────────

      let cropMouseDown = false;
      let cropStartX = 0,
        cropStartY = 0;
      let cropStartRect = { x: 0, y: 0, w: 0, h: 0 };
      let activeCropHandle = null;

      cropOverlay.addEventListener('mousedown', (e) => {
        if (!state.crop.active) return;
        const target = e.target;
        const handle = target.dataset.handle;
        if (handle) {
          activeCropHandle = handle;
          cropMouseDown = true;
          cropStartX = e.clientX;
          cropStartY = e.clientY;
          cropStartRect = {
            x: state.crop.x,
            y: state.crop.y,
            w: state.crop.w,
            h: state.crop.h,
          };
          e.preventDefault();
          return;
        }
        cropMouseDown = true;
        activeCropHandle = 'move';
        cropStartX = e.clientX;
        cropStartY = e.clientY;
        cropStartRect = {
          x: state.crop.x,
          y: state.crop.y,
          w: state.crop.w,
          h: state.crop.h,
        };
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!cropMouseDown || !state.crop.active) return;
        const dx = (e.clientX - cropStartX);
        const dy = (e.clientY - cropStartY);
        const imgW = state.image.width;
        const imgH = state.image.height;
        const canvasRect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / canvasRect.width;
        const scaleY = canvas.height / canvasRect.height;
        const dxi = dx * scaleX;
        const dyi = dy * scaleY;

        let newX = cropStartRect.x;
        let newY = cropStartRect.y;
        let newW = cropStartRect.w;
        let newH = cropStartRect.h;
        const ratio = state.crop.aspectRatio;

        const clampCrop = () => {
          newX = clamp(newX, 0, imgW - 10);
          newY = clamp(newY, 0, imgH - 10);
          newW = clamp(newW, 10, imgW - newX);
          newH = clamp(newH, 10, imgH - newY);
        };

        if (activeCropHandle === 'move') {
          newX = clamp(cropStartRect.x + dxi, 0, imgW - cropStartRect.w);
          newY = clamp(cropStartRect.y + dyi, 0, imgH - cropStartRect.h);
        } else if (activeCropHandle === 'se') {
          newW = clamp(cropStartRect.w + dxi, 10, imgW - cropStartRect.x);
          newH = clamp(cropStartRect.h + dyi, 10, imgH - cropStartRect.y);
          if (ratio) {
            if (newW / newH > ratio) newW = newH * ratio;
            else newH = newW / ratio;
          }
        } else if (activeCropHandle === 'ne') {
          newW = clamp(cropStartRect.w + dxi, 10, imgW - cropStartRect.x);
          newH = clamp(cropStartRect.h - dyi, 10, cropStartRect.y + cropStartRect.h);
          newY = cropStartRect.y + cropStartRect.h - newH;
          if (ratio) {
            if (newW / newH > ratio) newW = newH * ratio;
            else newH = newW / ratio;
          }
        } else if (activeCropHandle === 'sw') {
          newW = clamp(cropStartRect.w - dxi, 10, cropStartRect.x + cropStartRect.w);
          newH = clamp(cropStartRect.h + dyi, 10, imgH - cropStartRect.y);
          newX = cropStartRect.x + cropStartRect.w - newW;
          if (ratio) {
            if (newW / newH > ratio) newW = newH * ratio;
            else newH = newW / ratio;
          }
        } else if (activeCropHandle === 'nw') {
          newW = clamp(cropStartRect.w - dxi, 10, cropStartRect.x + cropStartRect.w);
          newH = clamp(cropStartRect.h - dyi, 10, cropStartRect.y + cropStartRect.h);
          newX = cropStartRect.x + cropStartRect.w - newW;
          newY = cropStartRect.y + cropStartRect.h - newH;
          if (ratio) {
            if (newW / newH > ratio) newW = newH * ratio;
            else newH = newW / ratio;
          }
        } else if (activeCropHandle === 'n') {
          newH = clamp(cropStartRect.h - dyi, 10, cropStartRect.y + cropStartRect.h);
          newY = cropStartRect.y + cropStartRect.h - newH;
          if (ratio) {
            newW = newH * ratio;
            if (newX + newW > imgW) newX = imgW - newW;
          }
        } else if (activeCropHandle === 's') {
          newH = clamp(cropStartRect.h + dyi, 10, imgH - cropStartRect.y);
          if (ratio) {
            newW = newH * ratio;
            if (newX + newW > imgW) newX = imgW - newW;
          }
        } else if (activeCropHandle === 'w') {
          newW = clamp(cropStartRect.w - dxi, 10, cropStartRect.x + cropStartRect.w);
          newX = cropStartRect.x + cropStartRect.w - newW;
          if (ratio) {
            newH = newW / ratio;
            if (newY + newH > imgH) newY = imgH - newH;
          }
        } else if (activeCropHandle === 'e') {
          newW = clamp(cropStartRect.w + dxi, 10, imgW - cropStartRect.x);
          if (ratio) {
            newH = newW / ratio;
            if (newY + newH > imgH) newY = imgH - newH;
          }
        }

        clampCrop();
        state.crop.x = newX;
        state.crop.y = newY;
        state.crop.w = newW;
        state.crop.h = newH;
        updateCropOverlay();
      });

      document.addEventListener('mouseup', () => {
        if (cropMouseDown) {
          cropMouseDown = false;
          activeCropHandle = null;
        }
      });

      // ─── Zoom ────────────────────────────────────────────────────

      function zoomIn() {
        state.zoom = Math.min(5, (state.zoom || 1) + 0.1);
        fitCanvasToContainer();
      }

      function zoomOut() {
        state.zoom = Math.max(0.1, (state.zoom || 1) - 0.1);
        fitCanvasToContainer();
      }

      function zoomFit() {
        state.zoom = 1;
        fitCanvasToContainer();
      }

      // ─── Event Bindings ─────────────────────────────────────────

      uploadBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) loadImage(e.target.files[0]);
        e.target.value = '';
      });
      uploadZone.addEventListener('dragover', (e) => { e.preventDefault();
        uploadZone.classList.add('dragover'); });
      uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
      uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
      });
      uploadZone.addEventListener('click', (e) => {
        if (e.target === uploadZone || e.target.closest('.upload-zone') && !e.target.closest('button')) {
          fileInput.click();
        }
      });

      document.querySelectorAll('.panel-tabs button').forEach(btn => {
        btn.addEventListener('click', () => {
          renderPanel(btn.dataset.tab);
        });
      });

      undoBtn.addEventListener('click', undo);
      redoBtn.addEventListener('click', redo);
      resetBtn.addEventListener('click', () => {
        if (state.image) {
          resetAllAdjustments(true);
          updateStatus('Image reset');
        }
      });

      gridToggle.addEventListener('click', () => {
        state.showGrid = !state.showGrid;
        gridOverlay.classList.toggle('active', state.showGrid);
      });

      beforeAfterBtn.addEventListener('mousedown', () => {
        state.beforeAfter = true;
        if (state.image) {
          ctx.drawImage(state.image, 0, 0, canvas.width, canvas.height);
        }
      });
      beforeAfterBtn.addEventListener('mouseup', () => {
        state.beforeAfter = false;
        renderImage();
      });
      beforeAfterBtn.addEventListener('mouseleave', () => {
        if (state.beforeAfter) {
          state.beforeAfter = false;
          renderImage();
        }
      });

      autoEnhanceBtn.addEventListener('click', autoEnhance);

      exportBtn.addEventListener('click', exportImage);

      zoomInBtn.addEventListener('click', zoomIn);
      zoomOutBtn.addEventListener('click', zoomOut);
      zoomFitBtn.addEventListener('click', zoomFit);

      document.getElementById('canvasArea').addEventListener('wheel', (e) => {
        if (e.ctrlKey || e.metaKey) {
          e.preventDefault();
          if (e.deltaY < 0) zoomIn();
          else zoomOut();
        }
      }, { passive: false });

      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
          e.preventDefault();
          if (e.shiftKey) redo();
          else undo();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
          e.preventDefault();
          redo();
        }
        if (e.key === 'Escape') {
          if (state.crop.active) cancelCrop();
        }
      });

      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          if (state.image) fitCanvasToContainer();
        }, 150);
      });

      // ─── Init ────────────────────────────────────────────────────

      canvas.width = 800;
      canvas.height = 600;
      canvas.style.width = '800px';
      canvas.style.height = '600px';
      overlayCanvas.width = 800;
      overlayCanvas.height = 600;
      overlayCanvas.style.width = '800px';
      overlayCanvas.style.height = '600px';
      updateStatus('Drop an image to start');
      exportBtn.disabled = true;

      renderPanel('adjust');

      console.log('🖼️ HARI Editor Pro+ loaded — 100% client-side, private & secure.');
      console.log('🔒 No data is ever sent to any server. All processing is local.');
      console.log('✨ New: Blending modes, Gradient Map, Vignette, Tilt-Shift, Auto Enhance, Spline Curves, Posterize, Oil Paint.');

      window.__HARI = { state, canvas, ctx, renderImage, fitCanvasToContainer };

    })();
  </script>
</body>
</html>
